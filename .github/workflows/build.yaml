name: Build DLL

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Configure (Win32 + static /MT)
      working-directory: ${{ github.workspace }}
      run: cmake -S wrapper -B build -A Win32 -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded

    - name: Build
      working-directory: ${{ github.workspace }}
      run: cmake --build build --config Release

    - name: List output
      working-directory: ${{ github.workspace }}
      run: dir build\Release

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: PbCryptoLzma
        path: build/Release/PbCryptoLzma.dll
        if-no-files-found: error
